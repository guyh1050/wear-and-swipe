<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wear&Swipe — אופנה חכמה</title>

  <!-- פונט -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

  <!-- עיצוב — מופרד לקבצים לפי תפקיד -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/screens.css">

  <!-- Firebase SDK (צד שרת בענן) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- מסך אימות -->
  <div class="auth-screen" id="auth-screen">
    <div class="auth-box">
      <div class="auth-logo">Wear<span class="amp">&amp;</span>Swipe</div>
      <div class="auth-tagline">הסטייל שלך, לומד אותך</div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" data-mode="login">כניסה</button>
        <button class="auth-tab" id="tab-register" data-mode="register">הרשמה</button>
      </div>
      <div class="auth-field">
        <label>שם משתמש</label>
        <input class="auth-input" id="auth-username" type="text" autocomplete="username">
      </div>
      <div class="auth-field">
        <label>סיסמה</label>
        <input class="auth-input" id="auth-password" type="password" autocomplete="current-password">
      </div>
      <div class="auth-field hidden" id="confirm-field">
        <label>אימות סיסמה</label>
        <input class="auth-input" id="auth-confirm" type="password" autocomplete="new-password">
      </div>
      <button class="auth-submit" id="auth-submit">כניסה</button>
      <div class="auth-error" id="auth-error"></div>
    </div>
  </div>

  <!-- האפליקציה -->
  <div class="app hidden" id="app">
    <header>
      <div class="logo">Wear<span class="amp">&amp;</span>Swipe</div>
      <button class="lang-toggle" id="lang-toggle">EN</button>
    </header>

    <nav class="tabs">
      <button class="tab active" data-view="swipe">גלה</button>
      <button class="tab" data-view="outfits">שילובים</button>
      <button class="tab" data-view="profile">פרופיל</button>
    </nav>

    <!-- מסך סווייפ -->
    <section class="view active" id="view-swipe">
      <div class="filter-bar">
        <button class="filter-bar-btn" id="open-filters">סינון וקטגוריות ☰</button>
      </div>
      <div class="deck" id="deck"></div>
      <div class="controls">
        <button class="ctrl-btn undo" id="btn-undo" title="חזור">↩</button>
        <div class="controls-main">
          <button class="ctrl-btn like" id="btn-like" title="לייק">♥</button>
          <button class="ctrl-btn super" id="btn-super" title="מועדף">★</button>
          <button class="ctrl-btn pass" id="btn-pass" title="דילוג">✕</button>
        </div>
        <button class="ctrl-btn info" id="btn-info" title="פרטים">i</button>
      </div>
    </section>

    <!-- מסך אווטפיטים -->
    <section class="view" id="view-outfits"></section>

    <!-- מסך פרופיל -->
    <section class="view" id="view-profile"></section>
  </div>

  <!-- מודל פרטי פריט -->
  <div class="modal-bg" id="info-modal">
    <div class="modal">
      <button class="modal-close" id="info-close">✕</button>
      <div id="info-content"></div>
    </div>
  </div>

  <!-- toast -->
  <div class="toast" id="toast"></div>

  <!-- נקודת הכניסה — מודול ראשי -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
